name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Security Scan (SAST)
        run: npm audit --audit-level=high

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: false

      - name: Build Next.js
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Performance Audit (Lighthouse CI)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/login
          temporaryPublicStorage: true
          configPath: '.lighthouserc.json'

  e2e-and-smoke:
    name: E2E & Smoke Test (Strict Blocking)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: E2E & Smoke Test (Strict Blocking)
        run: npm run test:e2e
        env:
          BASE_URL: https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app

      - name: Automated Zero-Downtime Rollback
        if: failure()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "🚨 E2E/Smoke Test Failed. Initiating fully automated rollback..."
          npx vercel rollback --yes --token $VERCEL_TOKEN
          echo "✅ Automated Rollback completed successfully."
