name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npx vitest run

      - name: Build Next.js
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  smoke-test:
    name: Smoke Test (Post-Deploy)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Wait for Vercel deployment
        run: sleep 30

      - name: Health check - /api/health
        run: |
          RESPONSE=$(curl -sf "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/api/health")
          echo "Health response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ /api/health OK"
          else
            echo "❌ /api/health failed"
            exit 1
          fi

      - name: Health check - /login (200 OK)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/login")
          echo "Login page HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ /login OK" || { echo "❌ /login returned $STATUS"; exit 1; }

      - name: Health check - /dashboard redirect (unauthenticated)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-redirs 0 \
            "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/dashboard")
          echo "Dashboard (unauth) HTTP status: $STATUS"
          [[ "$STATUS" == "302" || "$STATUS" == "307" || "$STATUS" == "200" ]] && echo "✅ /dashboard redirect OK" || { echo "❌ Unexpected status $STATUS"; exit 1; }

      - name: Health check - /api/analyze (mock mode)
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"anomalies":[{"drug_id":"SMOKE","drug_name":"스모크테스트약","hospital_code":"H001","baseline_volume":100,"target_volume":200,"change_pct":100,"absolute_change":100,"severity":"danger","rule_triggered":"volume_increase_gt_50"}]}' \
            "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/api/analyze")
          echo "API response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"results"'; then
            echo "✅ /api/analyze OK"
          else
            echo "❌ /api/analyze failed"
            exit 1
          fi
