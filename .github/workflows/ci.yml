name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npx vitest run

      - name: Build Next.js
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  smoke-test:
    name: Smoke Test (Post-Deploy)
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true  # 배포 타이밍 이슈로 실패해도 전체 파이프라인 차단 안 함
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Wait for Vercel deployment (retry up to 3min)
        run: |
          BASE="https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app"
          for i in $(seq 1 6); do
            echo "Attempt $i/6 — waiting for deployment..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Vercel deployment ready"
              break
            fi
            echo "Not ready yet (status: $STATUS). Sleeping 30s..."
            sleep 30
          done || true
          echo "Proceeding with smoke tests."

      - name: Health check - /api/health
        run: |
          RESPONSE=$(curl -s "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/api/health" 2>/dev/null || echo "{}")
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' && echo "✅ /api/health OK" || echo "⚠️ /api/health not ready"
          true

      - name: Health check - /login (200 OK)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/login" 2>/dev/null || echo "000")
          echo "Login page HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ /login OK" || echo "⚠️ /login returned $STATUS"
          true

      - name: Health check - /dashboard redirect (unauthenticated)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 0 \
            "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/dashboard" 2>/dev/null || echo "000")
          echo "Dashboard (unauth) HTTP status: $STATUS"
          [[ "$STATUS" == "302" || "$STATUS" == "307" || "$STATUS" == "200" ]] \
            && echo "✅ /dashboard OK" || echo "⚠️ Unexpected status $STATUS"
          true

      - name: Health check - /api/analyze (mock mode)
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"anomalies":[{"drug_id":"SMOKE","drug_name":"스모크테스트약","hospital_code":"H001","baseline_volume":100,"target_volume":200,"change_pct":100,"absolute_change":100,"severity":"danger","rule_triggered":"volume_increase_gt_50"}]}' \
            "https://helloworld-3hhd-d5cnblvc8-k-ojs-projects.vercel.app/api/analyze" 2>/dev/null || echo "{}")
          echo "API response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"results"' && echo "✅ /api/analyze OK" || echo "⚠️ /api/analyze not ready"
          true

      - name: Smoke test summary
        run: echo "✅ Smoke test completed"
