<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            padding: 40px 36px 32px;
            width: 100%;
            max-width: 400px;
        }

        .card-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
        }

        .field {
            position: relative;
            margin-bottom: 16px;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: #aaa;
            pointer-events: none;
        }

        .field input[type="text"],
        .field input[type="password"] {
            width: 100%;
            padding: 12px 40px 12px 40px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.97rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }

        .field input:focus {
            border-color: #4f80f7;
            box-shadow: 0 0 0 3px rgba(79, 128, 247, 0.13);
            background: #fff;
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 1rem;
            padding: 2px 4px;
            line-height: 1;
        }

        .toggle-pw:hover {
            color: #4f80f7;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4f80f7;
            cursor: pointer;
        }

        .remember-row label {
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
            user-select: none;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #4f80f7 0%, #3563e9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.12s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
            opacity: 1;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0;
            color: #bbb;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .btn-social {
            flex: 1;
            padding: 11px 8px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: opacity 0.18s, transform 0.12s;
            border: none;
        }

        .btn-social:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .btn-google {
            background: #fff;
            border: 1.5px solid #e0e0e0 !important;
            color: #444;
        }

        .btn-kakao {
            background: #FEE500;
            color: #3c1e1e;
        }

        .social-icon {
            font-size: 1.05rem;
        }

        .footer-links {
            text-align: center;
            font-size: 0.88rem;
            color: #888;
        }

        .footer-links a {
            color: #4f80f7;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-links .sep {
            margin: 0 8px;
            color: #ddd;
        }

        .error-msg {
            display: none;
            background: #fff0f0;
            color: #e53e3e;
            border: 1px solid #fca5a5;
            border-radius: 7px;
            padding: 9px 14px;
            font-size: 0.87rem;
            margin-bottom: 14px;
        }

        @media (max-width: 480px) {
            .card {
                margin: 16px;
                padding: 30px 20px 24px;
            }

            .social-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">🔒 로그인</div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" novalidate>
            <div class="field">
                <span class="field-icon">👤</span>
                <input type="text" id="username" placeholder="아이디를 입력하세요" autocomplete="username">
            </div>

            <div class="field">
                <span class="field-icon">🔑</span>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
                <button type="button" class="toggle-pw" id="togglePw" aria-label="비밀번호 표시/숨기기">👁️</button>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">아이디 저장</label>
            </div>

            <button type="submit" class="btn-login">로그인</button>
        </form>

        <div class="divider">또는</div>

        <div class="social-buttons">
            <button class="btn-social btn-google" onclick="socialLogin('Google')">
                <span class="social-icon">🌐</span> 구글
            </button>
            <button class="btn-social btn-kakao" onclick="socialLogin('카카오')">
                <span class="social-icon">💬</span> 카카오
            </button>
        </div>

        <div class="footer-links">
            <a href="#">회원가입</a>
            <span class="sep">|</span>
            <a href="#">비밀번호 찾기</a>
        </div>
    </div>

    <script>
        // 비밀번호 표시/숨기기 토글
        const togglePw = document.getElementById('togglePw');
        const passwordInput = document.getElementById('password');

        togglePw.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            togglePw.textContent = isHidden ? '🙈' : '👁️';
        });

        // 로그인 폼 유효성 검사
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username && !password) {
                showError('아이디와 비밀번호를 입력해주세요.');
                return;
            }
            if (!username) {
                showError('아이디를 입력해주세요.');
                return;
            }
            if (!password) {
                showError('비밀번호를 입력해주세요.');
                return;
            }

            hideError();

            if (username === '111' && password === '111') {
                window.location.href = 'main.html';
            } else {
                showError('아이디 또는 비밀번호가 올바르지 않습니다.');
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        // 소셜 로그인
        function socialLogin(provider) {
            alert(`${provider} 로그인은 아직 준비 중입니다.`);
        }
    </script>
</body>
</html>
